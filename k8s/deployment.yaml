apiVersion: apps/v1
kind: Deployment
metadata:
  name: revenue-os
  namespace: revenue-os
spec:
  replicas: 1
  selector:
    matchLabels:
      app: revenue-os
  template:
    metadata:
      labels:
        app: revenue-os
    spec:
      containers:
        - name: revenue-os
          image: ghcr.io/your-org/revenue-os:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: revenue-os-config
            - secretRef:
                name: revenue-os-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
